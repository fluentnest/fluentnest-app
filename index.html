<!DOCTYPE html>
<html>
<head>
  <title>FluentNest AI Teacher</title>
  <style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f4f8ff;
  text-align: center;
}

h1 {
  color: #4f46e5;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#chat {
  border: 1px solid #ccc;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
}
  </style>
</head>

<body>
  <h1>🪺 FluentNest</h1>
<h2>Build English Confidence Every Day</h2>
  <p>Practice conversations, improve grammar, and speak confidently.</p><div>
  <h3>📅 Today's Challenge</h3>
  <p>Introduce yourself in 3 English sentences.</p>
  </div>

<button onclick="alert('Welcome to FluentNest!')">Start Practice</button>

  <div id="chat"></div>

  <br>

  <input id="userInput" placeholder="Type your English sentence..." />
    <button onclick="talk()">Send</button>

  <script>
async function talk() {
  let input = document.getElementById("userInput").value;
  let chat = document.getElementById("chat");

  if (input.trim() === "") return;

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";
  document.getElementById("userInput").value = "";

  chat.innerHTML += "<p><b>AI:</b> Thinking...</p>";

  let res = await fetch(
    "https://api.allorigins.win/raw?url=https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: input
      })
    }
  );

  let data = await res.json();

  let reply = data?.[0]?.generated_text || "Sorry, I couldn't respond.";

  chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";
}
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>FluentNest AI Teacher</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    input { width: 70%; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>

<body>
  <h1>🪺 FluentNest</h1>
<h2>Build English Confidence Every Day</h2>
<p>Practice conversations, improve grammar, and speak confidently.</p>
<button>Start Practice</button>

  <div id="chat"></div>

  <br>

  <input id="userInput" placeholder="Type your English sentence..." />
  <button onclick="talk()">Send</button>

  <script>
    function talk() {
      let input = document.getElementById("userInput").value;
      let chat = document.getElementById("chat");

      if(input.trim() === "") return;

      chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

      let reply = "";

      if(input.toLowerCase().includes("hello")) {
        reply = "Hello! 👋 How are you today?";
      } else if(input.toLowerCase().includes("my name is")) {
        reply = "Nice to meet you! 😊 Tell me more about yourself.";
      } else {
        reply = "Good try 👍 Try speaking in full English sentences.";
      }

      chat.innerHTML += "<p><b>AI Teacher:</b> " + reply + "</p>";

      document.getElementById("userInput").value = "";
    }
  </script>
</body>
</html>

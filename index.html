<!DOCTYPE html>
<html>
<head>
  <title>FluentNest AI Teacher</title>
  <style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f4f8ff;
  text-align: center;
}

h1 {
  color: #4f46e5;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#chat {
  border: 1px solid #ccc;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
}
  </style>
</head>

<body>
  <h1>🪺 FluentNest</h1>
<h2>Build English Confidence Every Day</h2>
  <p>Practice conversations, improve grammar, and speak confidently.</p><div>
  <h3>📅 Today's Challenge</h3>
  <p>Introduce yourself in 3 English sentences.</p>
  </div>

<button onclick="alert('Welcome to FluentNest!')">Start Practice</button>

  <div id="chat"></div>

  <br>

  <input id="userInput" placeholder="Type your English sentence..." />
    <button onclick="talk()">Send</button>

  <script>
    function talk() {
      let lastTopic = "";
      
      let input = document.getElementById("userInput").value;
      let chat = document.getElementById("chat");

      if(input.trim() === "") return;

      chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

      let reply = "";
      if(input.toLowerCase().includes("hello")) {
  lastTopic = "greeting";
  reply = "Hello! 👋 How are you today?";

} else if(input.toLowerCase().includes("my name is")) {
  lastTopic = "intro";
  reply = "Nice to meet you! 😊 Tell me more about yourself.";

} else if(input.toLowerCase().includes("exam")) {
  lastTopic = "exam";
  reply = "Don't worry. What subject are you preparing for?";

} else if(input.toLowerCase().includes("movie")) {
  lastTopic = "movie";
  reply = "Which movie did you watch? Would you recommend it?";

} else if(input.toLowerCase().includes("college")) {
  lastTopic = "college";
  reply = "How is your college life going?";

} else if(lastTopic === "college") {
  reply = "Tell me more about your college experience.";

} else if(lastTopic === "exam") {
  reply = "Which subject is difficult for you?";

} else if(lastTopic === "movie") {
  reply = "Who was your favourite character in the movie?";

} else {
  reply = "I want to understand you better 😊 Can you explain a little more?";
      }

      chat.innerHTML += "<p><b>AI Teacher:</b> " + reply + "</p>";

      document.getElementById("userInput").value = "";
    }
  </script>
</body>
</html>

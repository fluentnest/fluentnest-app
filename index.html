<!DOCTYPE html>
<html>
<head>
  <title>FluentNest AI Teacher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    h2 {
      color: #cbd5e1;
      font-weight: normal;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      margin-top: 10px;
    }

    #chat {
      margin-top: 20px;
      height: 320px;
      overflow-y: auto;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🪺 FluentNest</h1>
  <h2>Build English Confidence Every Day</h2>

  <p>Practice conversations, improve grammar, and speak confidently.</p>

  <div>
    <h3>📅 Today's Challenge</h3>
    <p>Introduce yourself in 3 English sentences.</p>
  </div>

  <button onclick="alert('Welcome to FluentNest!')">Start Practice</button>

  <div id="chat"></div>

  <input id="userInput" placeholder="Type your English sentence..." />
  <br>
  <button onclick="talk()">Send</button>

<script>
async function talk() {
  let input = document.getElementById("userInput").value;
  let chat = document.getElementById("chat");

  if (input.trim() === "") return;

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";
  document.getElementById("userInput").value = "";

  chat.innerHTML += "<p><b>AI:</b> Thinking...</p>";

  try {
    let res = await fetch(
      "https://api.allorigins.win/raw?url=https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ inputs: input })
      }
    );

    let data = await res.json();

    let reply = data?.[0]?.generated_text || "I couldn't understand that, try again.";

    chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

  } catch (error) {
    chat.innerHTML += "<p><b>AI:</b> Error connecting to AI server.</p>";
  }
}
</script>

</body>
</html>

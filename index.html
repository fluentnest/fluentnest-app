<!DOCTYPE html>
<html>
<head>
  <title>FluentNest AI Teacher</title>
  <style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f4f8ff;
  text-align: center;
}

h1 {
  color: #4f46e5;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#chat {
  border: 1px solid #ccc;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  background: white;
  border-radius: 10px;
  margin-top: 20px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
}
  </style>
</head>

<body>
  <h1>🪺 FluentNest</h1>
<h2>Build English Confidence Every Day</h2>

<button onclick="alert('Welcome to FluentNest!')">Start Practice</button>

  <div id="chat"></div>

  <br>

  <input id="userInput" placeholder="Type your English sentence..." />
  <p>Practice conversations, improve grammar, and speak confidently.</p>
  <div>
  <h3>📅 Today's Challenge</h3>
  <p>Introduce yourself in 3 English sentences.</p>
  </div><button onclick="talk()">Send</button>

  <script>
    function talk() {
      let input = document.getElementById("userInput").value;
      let chat = document.getElementById("chat");

      if(input.trim() === "") return;

      chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

      let reply = "";

      if(input.toLowerCase().includes("hello")) {
        reply = "Hello! 👋 How are you today?";
      } else if(input.toLowerCase().includes("my name is")) {
        reply = "Nice to meet you! 😊 Tell me more about yourself.";
      } else {
        reply = "Good try 👍 Try speaking in full English sentences.";
      }

      chat.innerHTML += "<p><b>AI Teacher:</b> " + reply + "</p>";

      document.getElementById("userInput").value = "";
    }
  </script>
</body>
</html>
